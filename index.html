<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio Tracker · 30/70</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05070c;--card:#0b0f19;--card2:#0f1526;--border:#172237;--orange:#f7931a;--bnb:#f0b90b;--green:#00e676;--red:#ff3d00;--muted:#8ea1b8;--dim:#384c66;--text:#e2e8f0;--glow:rgba(0,230,118,0.15)}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;padding-bottom:60px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 30% -20%,rgba(247,147,26,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.header{position:relative;z-index:10;background:linear-gradient(180deg,#0b0f19,rgba(5,7,12,0.95));border-bottom:1px solid rgba(247,147,26,0.15);padding:16px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:38px;height:38px;background:linear-gradient(135deg,#f7931a,#f0b90b);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#000;font-family:'Rajdhani',sans-serif;box-shadow:0 0 15px rgba(247,147,26,0.2)}
.brand-sub{font-size:9px;letter-spacing:3px;color:var(--orange);text-transform:uppercase;font-weight:700}
.brand-name{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;letter-spacing:0.5px}
.live-pill{display:flex;align-items:center;gap:6px;background:#0f1526;border:1px solid var(--border);border-radius:20px;padding:6px 12px;box-shadow:inset 0 1px 3px rgba(0,0,0,0.5)}
.pulse{position:relative;width:8px;height:8px;display:inline-flex;align-items:center}
.pulse-ring{position:absolute;inset:0;border-radius:50%;background:var(--green);opacity:.6;animation:ping 1.2s ease-in-out infinite}
.pulse-dot{position:absolute;inset:2px;border-radius:50%;background:var(--green)}
.pulse-ring.off{background:var(--red);animation:none}.pulse-dot.off{background:var(--red)}
@keyframes ping{0%,100%{transform:scale(1);opacity:.6}60%{transform:scale(2.5);opacity:0}}
.live-txt{font-size:9px;letter-spacing:2px;color:var(--green);font-weight:700;text-transform:uppercase}.live-txt.off{color:var(--red)}
.cd{font-size:9px;color:var(--dim);font-weight:bold}
.price-heroes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ph{background:rgba(11,15,25,0.6);border:1px solid var(--border);border-radius:14px;padding:14px;position:relative;overflow:hidden;text-align:center;backdrop-filter:blur(10px)}
.ph::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ph-btc::before{background:linear-gradient(90deg,transparent,var(--orange),transparent)}
.ph-bnb::before{background:linear-gradient(90deg,transparent,var(--bnb),transparent)}
.ph-tag{font-size:9px;letter-spacing:2.5px;color:var(--muted);margin-bottom:6px;font-weight:bold}
.ph-price{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;line-height:1;transition:all .15s}
.ph-btc .ph-price{color:var(--orange)}.ph-bnb .ph-price{color:var(--bnb)}
.ph-price.up{color:var(--green);text-shadow:0 0 10px rgba(0,230,118,0.3)}
.ph-price.dn{color:var(--red);text-shadow:0 0 10px rgba(255,61,0,0.3)}
.ph-sub{font-size:10px;color:var(--muted);margin-top:4px}
.fluct-bar{background:#080c14;border:1px solid var(--border);border-radius:12px;padding:12px 10px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.fluct-row{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr}
.fluct-item{text-align:center;padding:2px 4px}
.fluct-sep{background:var(--border);margin:2px 0}
.fluct-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:bold}
.fluct-val{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;line-height:1.2}
.fluct-val.mono{font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:normal}
.fluct-sub{font-size:9px;color:var(--muted);margin-top:2px}
.tabs{display:flex;background:#070a12;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:50;backdrop-filter:blur(15px);border-top:1px solid rgba(255,255,255,0.02)}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:14px 16px;white-space:nowrap;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;font-weight:600}
.tab.active{color:var(--orange);border-bottom:2px solid var(--orange);background:rgba(247,147,26,0.03)}
.panel{display:none;padding:16px;position:relative;z-index:1;animation:fadeIn 0.25s ease-out}.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:12px;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.card-hot{background:linear-gradient(135deg,rgba(0,230,118,0.04),rgba(5,7,12,0.4));border:1px solid rgba(0,230,118,0.2);border-radius:16px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 4px 25px rgba(0,0,0,0.3)}
