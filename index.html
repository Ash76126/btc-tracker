<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BTC Portfolio Tracker 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--card:#0c1120;--card2:#0e1626;--border:#1a2438;--border2:#111826;--orange:#f7931a;--blue:#3d6cf7;--green:#4caf50;--red:#ef5350;--muted:#7a8899;--dim:#334455;--text:#dde3ee}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;padding-bottom:60px;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(160deg,#0c1120,#0e1828);border-bottom:1px solid #f7931a22;padding:16px 20px 14px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{font-size:26px;filter:drop-shadow(0 0 8px #f7931a88);line-height:1}
.brand-sub{font-size:9px;letter-spacing:4px;color:var(--orange);text-transform:uppercase;margin-bottom:2px}
.brand-title{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700}
.live-pill{display:flex;align-items:center;gap:5px;background:#0e1626;border:1px solid #1a2438;border-radius:20px;padding:5px 10px}
.pulse{position:relative;width:8px;height:8px;display:inline-flex;align-items:center;flex-shrink:0}
.pulse-ring{position:absolute;inset:0;border-radius:50%;background:var(--green);opacity:.5;animation:ping 1.5s ease-in-out infinite}
.pulse-ring.orange{background:var(--orange);animation:none}
.pulse-dot{position:absolute;inset:2px;border-radius:50%;background:var(--green)}
.pulse-dot.orange{background:var(--orange)}
@keyframes ping{0%,100%{transform:scale(1);opacity:.5}60%{transform:scale(2.2);opacity:0}}
.live-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--green);white-space:nowrap}
.live-label.orange{color:var(--orange)}
.countdown{font-size:8px;color:#2a3a50;white-space:nowrap}
.price-hero{text-align:center;padding:4px 0 10px}
.price-hero-val{font-family:'Rajdhani',sans-serif;font-size:42px;font-weight:700;color:var(--orange);letter-spacing:1px;transition:color .2s;line-height:1}
.price-hero-val.up{color:var(--green)}.price-hero-val.dn{color:var(--red)}
.price-hero-sub{font-size:11px;color:var(--dim);margin-top:5px}
.price-hero-time{font-size:8px;color:#1e2e42;margin-top:2px}
.fetching-msg{font-size:13px;color:var(--dim);animation:blink 1.2s infinite;text-align:center;padding:10px 0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.fluct-bar{background:#0a0e18;border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-top:4px}
.fluct-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.fluct-item{text-align:center;flex:1}
.fluct-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#8899aa;margin-bottom:4px}
.fluct-val{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;transition:color .2s}
.fluct-divider{width:1px;height:32px;background:var(--border);flex-shrink:0}
.tabs{display:flex;background:#090d15;border-bottom:1px solid var(--border2);padding:0 20px;overflow-x:auto}
.tab{background:none;border:none;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:12px 16px;white-space:nowrap;color:var(--dim);border-bottom:2px solid transparent;transition:color .2s}
.tab.active{color:var(--orange);border-bottom:2px solid var(--orange)}
.panel{display:none;padding:18px 20px}.panel.active{display:block}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.metric-label{font-size:9px;color:#8899aa;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.metric-val{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;transition:color .2s}
.metric-sub{font-size:11px;color:#8899aa;margin-top:4px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 14px 10px;margin-bottom:16px}
.card-label{font-size:9px;color:var(--orange);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.chart-legend{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:10px;color:#8899aa}
.leg{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle}
.status-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.phase-badge{display:inline-block;background:#f7931a14;border:1px solid #f7931a44;border-radius:6px;padding:6px 14px;font-size:10px;color:var(--orange);letter-spacing:2px;margin-bottom:10px}
.rules{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.rule{background:var(--card2);border-radius:8px;padding:10px 12px}
.rule-lbl{font-size:9px;color:var(--orange);letter-spacing:2px;margin-bottom:4px}
.rule-txt{font-size:11px;color:#aabbcc}
.chart-wrap{position:relative;height:160px}
.chart-legend{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:9px;color:var(--dim)}
.leg{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle}
.status-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.phase-badge{display:inline-block;background:#f7931a14;border:1px solid #f7931a44;border-radius:6px;padding:5px 12px;font-size:9px;color:var(--orange);letter-spacing:2px;margin-bottom:10px}
.rules{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.rule{background:var(--card2);border-radius:8px;padding:9px 12px}
.rule-lbl{font-size:7px;color:var(--orange);letter-spacing:2px;margin-bottom:3px}
.rule-txt{font-size:9px;color:var(--muted)}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-header{padding:11px 16px;border-bottom:1px solid var(--border);font-size:7px;color:var(--orange);letter-spacing:3px;text-transform:uppercase}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:8px 12px;text-align:left;background:#090d15;color:var(--dim);font-size:7px;letter-spacing:2px;font-weight:400;text-transform:uppercase;white-space:nowrap}
td{padding:10px 12px;border-top:1px solid var(--border2);white-space:nowrap}
tfoot td{background:var(--card2);border-top:1px solid #f7931a22;font-weight:700}
.note{margin-top:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:9px;color:var(--dim);line-height:1.8}
.note-lbl{color:var(--orange);font-size:7px;letter-spacing:3px;text-transform:uppercase}
.pv-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:16px}
.pv-num{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--orange)}
.pv-sub{font-size:10px;color:var(--dim);margin-top:3px}
.milestone{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.milestone.done{border-color:#4caf5033}
.ms-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ms-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700}
.ms-badge{font-size:7px;background:#4caf5018;color:var(--green);border:1px solid #4caf5033;border-radius:4px;padding:2px 7px;letter-spacing:2px;margin-left:7px;vertical-align:middle}
.ms-detail{font-size:9px;color:var(--dim);margin-top:3px}
.ms-pct{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;text-align:right}
.ms-pct-lbl{font-size:8px;color:var(--dim);text-align:right}
.prog-track{background:#111826;border-radius:4px;height:5px;overflow:hidden;margin-bottom:12px}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--orange),#ffb347);transition:width .5s ease}
.prog-fill.done{background:var(--green)}
.ms-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ms-stat{background:var(--card2);border:1px solid #1e2e44;border-radius:10px;padding:11px 12px}
.ms-stat-lbl{font-size:8px;color:#8899aa;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.ms-stat-val{font-size:13px;color:#dde3ee;font-weight:700;font-family:'Rajdhani',sans-serif}
.ms-stat-sub{font-size:9px;color:#667788;margin-top:2px}
.ms-target-row{display:flex;align-items:center;justify-content:space-between;background:#f7931a0d;border:1px solid #f7931a44;border-radius:12px;padding:14px 16px;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.ms-target-price{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:#f7931a}
.ms-target-lbl{font-size:8px;color:#aabbcc;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.ms-multiplier{background:#1a2438;border:1px solid #3a4a64;border-radius:6px;padding:5px 12px;font-size:11px;color:#aabbcc;font-family:'Rajdhani',sans-serif;font-weight:700;white-space:nowrap}
.ms-multiplier.close{color:#81c784;border-color:#4caf5055;background:#4caf5018}
.ms-multiplier.mid{color:#ffcc80;border-color:#ffb34755;background:#ffb34718}
.ms-multiplier.far{color:#ef9a9a;border-color:#ef535055;background:#ef535018}
.ms-harvest{font-size:10px;color:#aabbcc;margin-top:8px;padding:10px 14px;background:#ffffff08;border:1px solid #1e2e44;border-left:3px solid #f7931a55;border-radius:0 8px 8px 0;line-height:1.7}
/* ── BUFFER HEALTH ── */
.buf-card{border-radius:14px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden;transition:all .4s ease}
.buf-card.safe{background:linear-gradient(135deg,#0a1a0e,#0c1e12);border:1px solid #4caf5055}
.buf-card.warn{background:linear-gradient(135deg,#1a1208,#1e1608);border:1px solid #f7931a55}
.buf-card.shield{background:linear-gradient(135deg,#0c1120,#0e1626);border:1px solid #3d6cf755}
.buf-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;transition:background .4s}
.buf-card.safe::before{background:linear-gradient(90deg,transparent,#4caf50,transparent)}
.buf-card.warn::before{background:linear-gradient(90deg,transparent,#f7931a,transparent)}
.buf-card.shield::before{background:linear-gradient(90deg,transparent,#3d6cf7,transparent)}
.buf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.buf-title{font-size:8px;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.buf-state{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;line-height:1.3}
.buf-action{margin-top:14px;border-radius:10px;padding:14px 16px;font-size:12px;line-height:1.9}
.buf-action.safe{background:#4caf5018;border:1px solid #4caf5055;color:#c8e6c9}
.buf-action.warn{background:#f7931a18;border:1px solid #f7931a55;color:#ffe0b2}
.buf-action.shield{background:#3d6cf718;border:1px solid #3d6cf755;color:#bbdefb}
.buf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.buf-stat{background:#ffffff08;border:1px solid #1e2e44;border-radius:10px;padding:12px 14px}
.buf-stat-lbl{font-size:8px;color:#8899aa;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.buf-stat-val{font-size:14px;font-weight:700;font-family:'Rajdhani',sans-serif;color:#dde3ee}
.buf-slider-wrap{margin-top:14px}
.buf-slider-lbl{font-size:8px;color:#aabbcc;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.buf-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:4px;outline:none;cursor:pointer;background:linear-gradient(90deg,#4caf50 var(--bpct,100%),#1a2438 var(--bpct,100%))}
.buf-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#4caf50,#81c784);border:3px solid #07090f;cursor:pointer}
.buf-track{background:#111826;border-radius:4px;height:8px;overflow:hidden;margin-top:10px}
.buf-fill{height:100%;border-radius:4px;transition:width .4s ease,background .4s}
.shield-note{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:10px;color:#8899aa;line-height:1.9}
/* ── VAULT ── */
.vault-hero{background:linear-gradient(135deg,#0c1a2e,#0e1420);border:1px solid #f7931a44;border-radius:16px;padding:22px 20px;margin-bottom:20px;text-align:center;position:relative;overflow:hidden}
.vault-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#f7931a,#ffb347,#f7931a,transparent)}
.vault-hero-icon{font-size:36px;margin-bottom:8px}
.vault-hero-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.vault-hero-sub{font-size:10px;color:#8899aa;letter-spacing:3px;text-transform:uppercase}
.vault-section-lbl{font-size:8px;color:#f7931a;letter-spacing:4px;text-transform:uppercase;margin:20px 0 10px;padding-left:4px}
.vault-rule{background:var(--card);border:1px solid #1e2e44;border-radius:12px;padding:16px 18px;margin-bottom:10px;position:relative;overflow:hidden;transition:border-color .2s}
.vault-rule:hover{border-color:#f7931a44}
.vault-rule::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rule-color,#f7931a)}
.vault-rule-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.vault-rule-num{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--rule-color,#f7931a);background:var(--rule-bg,#f7931a18);border:1px solid var(--rule-color,#f7931a);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vault-rule-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:#fff}
.vault-rule-body{font-size:11px;color:#aabbcc;line-height:1.8;padding-left:36px}
.vault-rule-tag{display:inline-block;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-top:6px;margin-left:36px}
/* refill window */
.refill-card{border-radius:14px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden;transition:all .5s}
.refill-card.locked{background:#0c1120;border:1px solid #1e2e44;filter:none}
.refill-card.unlocked{background:linear-gradient(135deg,#0a1a0e,#0c2010);border:1px solid #4caf5055}
.refill-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.refill-card.locked::before{background:#1e2e44}
.refill-card.unlocked::before{background:linear-gradient(90deg,transparent,#4caf50,transparent)}
.refill-lock{text-align:center;padding:10px 0}
.refill-lock-icon{font-size:32px;margin-bottom:8px;filter:grayscale(1);opacity:.4}
.refill-lock-txt{font-size:10px;color:#334455;letter-spacing:2px;text-transform:uppercase}
.refill-unlock-lbl{font-size:8px;color:#4caf50;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.refill-date{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:#4caf50;margin-bottom:4px}
.refill-countdown{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.refill-cd-item{background:#4caf5010;border:1px solid #4caf5033;border-radius:10px;padding:10px;text-align:center}
.refill-cd-val{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#4caf50}
.refill-cd-lbl{font-size:8px;color:#4caf5088;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.refill-uptober{margin-top:12px;background:#f7931a0d;border:1px solid #f7931a22;border-radius:8px;padding:10px 14px;font-size:10px;color:#ffcc80;line-height:1.7}
/* ── SIMULATOR ── */
.sim-price-hero{background:linear-gradient(135deg,#0c1a2e,#0e1828);border:1px solid #f7931a33;border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}
.sim-price-display{font-family:'Rajdhani',sans-serif;font-size:44px;font-weight:700;color:#f7931a;line-height:1;margin-bottom:4px}
.sim-price-sub{font-size:9px;color:var(--dim);margin-bottom:16px}
.sim-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:4px;outline:none;cursor:pointer;background:linear-gradient(90deg,#f7931a var(--pct,50%),#1a2438 var(--pct,50%))}
.sim-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#f7931a,#ffb347);border:3px solid #07090f;cursor:pointer;box-shadow:0 0 10px #f7931a55}
.sim-range-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--dim);margin-top:8px}
.sim-presets{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}
.sim-preset{background:#0a0e18;border:1px solid #1a2438;border-radius:20px;padding:5px 13px;font-size:9px;color:var(--dim);cursor:pointer;font-family:'Share Tech Mono',monospace;letter-spacing:1px;transition:all .2s}
.sim-preset:hover,.sim-preset.active{background:#f7931a15;border-color:#f7931a44;color:#f7931a}
.sim-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sim-metric{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.sim-metric.highlight{border-color:#f7931a33;background:linear-gradient(135deg,#0e1828,#0c1a2e)}
.sim-metric-lbl{font-size:7px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.sim-metric-val{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;transition:color .3s}
.sim-metric-sub{font-size:9px;color:var(--dim);margin-top:3px}
.sim-milestones{margin-bottom:16px}
.sim-ms{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:border-color .3s}
.sim-ms.unlocked{border-color:#4caf5044;background:linear-gradient(135deg,#0a1a0e,#0c1a10)}
.sim-ms.current{border-color:#f7931a44;background:linear-gradient(135deg,#0e1520,#0c1828)}
.sim-ms-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sim-ms-name{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700}
.sim-ms-status{font-size:8px;padding:3px 10px;border-radius:20px;letter-spacing:2px;font-weight:600}
.sim-ms-status.unlocked{background:#4caf5018;color:#4caf50;border:1px solid #4caf5033}
.sim-ms-status.locked{background:#1a2438;color:#aabbcc;border:1px solid #2a3448}
.sim-ms-status.current{background:#f7931a18;color:#f7931a;border:1px solid #f7931a33}
.sim-ms-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sim-ms-stat{background:#f7931a06;border-radius:8px;padding:8px 10px}
.sim-ms-stat.green{background:#4caf5008}
.sim-ms-stat-lbl{font-size:8px;color:#8899aa;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.sim-ms-stat-val{font-size:12px;font-weight:700;color:#dde3ee;font-family:'Rajdhani',sans-serif}
.sim-gain-bar{height:3px;border-radius:3px;background:#1a2438;margin-top:10px;overflow:hidden}
.sim-gain-fill{height:100%;border-radius:3px;transition:width .4s ease}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;font-size:11px;color:var(--dim)}
.swp-card{background:linear-gradient(135deg,#0e1828,#0c1a2e);border:1px solid #f7931a33;border-radius:14px;padding:18px 20px;margin-bottom:18px;position:relative;overflow:hidden}
.swp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#f7931a,#ffb347,#f7931a,transparent);animation:shimmer 3s linear infinite;background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.swp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.swp-label{font-size:9px;color:var(--orange);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.swp-amount{font-family:'Rajdhani',sans-serif;font-size:38px;font-weight:700;
